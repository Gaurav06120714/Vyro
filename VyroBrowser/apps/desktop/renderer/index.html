<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' *; img-src * data: blob:; media-src * blob:; connect-src *;">
  <title>Vyro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- TAB BAR -->
  <div class="tabbar" id="tabbar">
    <!-- Vyro logo sits in the traffic-light zone -->
    <div class="tabbar-logo">
      <svg width="20" height="20" viewBox="0 0 80 80" fill="none">
        <path d="M40 4 L72 22 L72 58 L40 76 L8 58 L8 22 Z" fill="#6366f1"/>
        <path d="M24 28 L40 54 L56 28" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div class="tabs-list" id="tabs-list"></div>
    <button class="new-tab-btn" id="new-tab-btn" title="New Tab">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="nav-controls">
      <button class="nav-btn" id="btn-back" title="Back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="nav-btn" id="btn-forward" title="Forward">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="nav-btn" id="btn-refresh" title="Refresh">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button class="nav-btn" id="btn-home" title="Home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </button>
    </div>

    <div class="address-bar-wrapper">
      <div class="lock-icon" id="lock-icon">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <input
        type="text"
        id="address-bar"
        class="address-bar"
        placeholder="Search or enter address..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="go-btn" id="btn-go" title="Go">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>

    <div class="nav-actions">
      <button class="nav-btn" id="btn-bookmark" title="Bookmark">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- MAIN AREA: sidebar + browser content -->
  <div class="main-area">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <p class="sidebar-label">Quick Access</p>
        <div class="sidebar-bookmarks" id="sidebar-bookmarks">
          <button class="bookmark-item" data-url="https://www.youtube.com">
            <img src="https://www.google.com/s2/favicons?sz=32&domain=youtube.com" class="favicon" />
            <span>YouTube</span>
          </button>
          <button class="bookmark-item" data-url="https://www.google.com">
            <img src="https://www.google.com/s2/favicons?sz=32&domain=google.com" class="favicon" />
            <span>Google</span>
          </button>
          <button class="bookmark-item" data-url="https://www.reddit.com">
            <img src="https://www.google.com/s2/favicons?sz=32&domain=reddit.com" class="favicon" />
            <span>Reddit</span>
          </button>
          <button class="bookmark-item" data-url="https://github.com">
            <img src="https://www.google.com/s2/favicons?sz=32&domain=github.com" class="favicon" />
            <span>GitHub</span>
          </button>
          <button class="bookmark-item" data-url="https://x.com">
            <img src="https://www.google.com/s2/favicons?sz=32&domain=x.com" class="favicon" />
            <span>X / Twitter</span>
          </button>
          <button class="bookmark-item" data-url="https://www.instagram.com">
            <img src="https://www.google.com/s2/favicons?sz=32&domain=instagram.com" class="favicon" />
            <span>Instagram</span>
          </button>
          <button class="bookmark-item" data-url="https://chat.openai.com">
            <img src="https://www.google.com/s2/favicons?sz=32&domain=chat.openai.com" class="favicon" />
            <span>ChatGPT</span>
          </button>
          <button class="bookmark-item" data-url="https://www.netflix.com">
            <img src="https://www.google.com/s2/favicons?sz=32&domain=netflix.com" class="favicon" />
            <span>Netflix</span>
          </button>
        </div>
      </div>
    </div>

    <!-- WEBVIEW CONTAINER -->
    <div class="browser-content" id="browser-content">
      <!-- New Tab page shown when no webview -->
      <div class="new-tab-page" id="new-tab-page">
        <div class="nt-logo">
          <svg width="72" height="72" viewBox="0 0 80 80" fill="none">
            <path d="M40 4 L72 22 L72 58 L40 76 L8 58 L8 22 Z" fill="#6366f1"/>
            <path d="M24 28 L40 54 L56 28" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
          <h1>Vyro</h1>
          <p>Your personal AI browser</p>
        </div>
        <div class="nt-search">
          <input type="text" id="nt-search-input" placeholder="Search the web..." autocomplete="off" />
        </div>
        <div class="nt-shortcuts">
          <button class="shortcut" data-url="https://youtube.com">
            <div class="shortcut-icon" style="background:#ff0000">&#9654;</div>
            <span>YouTube</span>
          </button>
          <button class="shortcut" data-url="https://google.com">
            <div class="shortcut-icon" style="background:#4285f4">G</div>
            <span>Google</span>
          </button>
          <button class="shortcut" data-url="https://reddit.com">
            <div class="shortcut-icon" style="background:#ff4500">R</div>
            <span>Reddit</span>
          </button>
          <button class="shortcut" data-url="https://github.com">
            <div class="shortcut-icon" style="background:#24292e">&#8997;</div>
            <span>GitHub</span>
          </button>
          <button class="shortcut" data-url="https://netflix.com">
            <div class="shortcut-icon" style="background:#e50914">N</div>
            <span>Netflix</span>
          </button>
          <button class="shortcut" data-url="https://x.com">
            <div class="shortcut-icon" style="background:#000000">X</div>
            <span>X</span>
          </button>
        </div>
      </div>
      <!-- webviews injected here by JS -->
    </div>
  </div>

  <!-- LOADING BAR -->
  <div class="loading-bar" id="loading-bar"></div>

  <script src="shortcuts/defaults.js"></script>
  <script src="shortcuts/ShortcutManager.js"></script>
  <script src="shortcuts/actions.js"></script>
  <script src="shortcuts/CommandPalette.js"></script>
  <script src="shortcuts/ShortcutsModal.js"></script>
  <script src="shortcuts/ShortcutsPage.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
